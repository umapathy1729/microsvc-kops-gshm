apiVersion: apps/v1
kind: Deployment
metadata:
  name: service3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service3
  template:
    metadata:
      labels:
        app: service3
    spec:
      containers:
      - name: service3
        image: umapathy22/service3
        ports:
        - containerPort: 3003
        env:
        - name: PORT
          value: "3003"
---
apiVersion: v1
kind: Service
metadata:
  name: service3
spec:
  selector:
    app: service3
  ports:
  - port: 3003
    targetPort: 3003
  type: LoadBalancer
