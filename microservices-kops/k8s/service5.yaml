apiVersion: apps/v1
kind: Deployment
metadata:
  name: service5
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service5
  template:
    metadata:
      labels:
        app: service5
    spec:
      containers:
      - name: service5
        image: your-dockerhub/service5:latest
        ports:
        - containerPort: 3005
        env:
        - name: PORT
          value: "3005"
---
apiVersion: v1
kind: Service
metadata:
  name: service5
spec:
  selector:
    app: service5
  ports:
  - port: 3005
    targetPort: 3005
  type: ClusterIP
