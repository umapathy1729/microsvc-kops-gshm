apiVersion: apps/v1
kind: Deployment
metadata:
  name: service4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service4
  template:
    metadata:
      labels:
        app: service4
    spec:
      containers:
      - name: service4
        image: your-dockerhub/service4:latest
        ports:
        - containerPort: 3004
        env:
        - name: PORT
          value: "3004"
---
apiVersion: v1
kind: Service
metadata:
  name: service4
spec:
  selector:
    app: service4
  ports:
  - port: 3004
    targetPort: 3004
  type: ClusterIP
